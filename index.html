<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2a1a4a">
<title>スタンド学習ドリル</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    background:linear-gradient(160deg,#1a0f33 0%,#2a1a4a 50%,#3d1a5c 100%);
    color:#fff; overflow-x:hidden;
    min-height:100%;
  }
  #app { max-width:480px; margin:0 auto; min-height:100vh; position:relative; padding:16px; }

  /* ゴゴゴ背景 */
  .gogogo {
    position:fixed; font-weight:900; color:rgba(255,215,0,.10);
    font-size:64px; pointer-events:none; user-select:none; z-index:0;
    animation:gogofloat 6s ease-in-out infinite;
  }
  @keyframes gogofloat { 0%,100%{transform:translateY(0) rotate(-8deg)} 50%{transform:translateY(-14px) rotate(-4deg)} }

  .screen { display:none; position:relative; z-index:1; }
  .screen.active { display:block; animation:fadein .25s ease; }
  @keyframes fadein { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }

  h1 {
    font-size:26px; text-align:center; margin:8px 0 2px; letter-spacing:2px;
    background:linear-gradient(180deg,#ffe97d,#ffb300);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 3px 0 rgba(0,0,0,.35);
    font-weight:900;
  }
  .subtitle { text-align:center; font-size:12px; color:#c9b8ff; margin-bottom:14px; letter-spacing:4px; }

  .sound-btn {
    position:absolute; top:2px; right:0; z-index:5;
    width:44px; height:44px; border-radius:50%;
    background:#2e1b57; border:2px solid #6b4fa8;
    font-size:20px; cursor:pointer; font-family:inherit;
    display:flex; align-items:center; justify-content:center;
  }
  .sound-btn.off { opacity:.55; border-color:#4a3d6b; }
  .sound-btn:active { transform:scale(.92); }

  /* キャラカード */
  .chara-card {
    background:linear-gradient(160deg,#40286e,#241245);
    border:3px solid #ffd54a; border-radius:20px;
    padding:18px 14px 14px; text-align:center; position:relative; overflow:hidden;
    box-shadow:0 6px 24px rgba(0,0,0,.5), inset 0 0 40px rgba(255,213,74,.08);
  }
  .chara-emoji { font-size:88px; line-height:1.1; filter:drop-shadow(0 6px 10px rgba(0,0,0,.5)); animation:charabob 2.4s ease-in-out infinite; display:inline-block; }
  @keyframes charabob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px) rotate(2deg)} }
  .chara-name { font-size:20px; font-weight:900; color:#ffe97d; margin-top:6px; letter-spacing:1px; }
  .chara-sub { font-size:12px; color:#cbbcf5; margin-top:3px; }
  .lv-row { display:flex; justify-content:center; align-items:center; gap:10px; margin-top:10px; }
  .lv-badge { background:#ffd54a; color:#3a2703; font-weight:900; border-radius:999px; padding:3px 14px; font-size:15px; }
  .streak { font-size:13px; color:#ffd0a0; font-weight:700; }
  .expbar { height:14px; background:rgba(0,0,0,.45); border-radius:999px; margin-top:10px; overflow:hidden; border:1px solid rgba(255,213,74,.4); }
  .expfill { height:100%; background:linear-gradient(90deg,#b57bff,#ffd54a); width:0%; transition:width .8s cubic-bezier(.2,.8,.2,1); border-radius:999px; }
  .exptext { font-size:11px; color:#bfb0e8; margin-top:4px; }

  .menacing { position:absolute; font-weight:900; color:rgba(255,213,74,.35); font-size:26px; pointer-events:none; }

  /* 教科ボタン */
  .subject-grid { display:grid; gap:12px; margin-top:18px; }
  .subj-btn {
    display:flex; align-items:center; gap:14px; width:100%;
    background:linear-gradient(135deg,#4a2f80,#2c1755);
    border:2px solid #8a63d2; border-radius:16px; padding:14px 16px;
    color:#fff; font-size:18px; font-weight:800; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.4);
    transition:transform .08s ease;
    font-family:inherit; text-align:left;
  }
  .subj-btn:active { transform:scale(.97); }
  .subj-btn .icon { font-size:30px; }
  .subj-btn .desc { font-size:11px; color:#c9b8ff; font-weight:600; display:block; margin-top:2px; }
  .subj-btn.mix { border-color:#ffd54a; background:linear-gradient(135deg,#6e4a1e,#3d2a0e); }

  .stats-row { display:flex; justify-content:space-around; margin-top:16px; font-size:12px; color:#cbbcf5; }
  .stats-row b { color:#ffe97d; font-size:16px; display:block; text-align:center; }
  .stats-row div { text-align:center; }

  /* クイズ画面 */
  .quiz-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .q-progress { font-weight:900; color:#ffe97d; font-size:15px; letter-spacing:1px; }
  .combo { font-weight:900; color:#ff8ad4; font-size:15px; min-height:20px; }
  .quit-btn { background:none; border:1px solid #7a5fb0; color:#b9a5ea; border-radius:8px; padding:4px 10px; font-size:12px; font-family:inherit; }

  .q-card {
    background:linear-gradient(160deg,#3b2569,#221142);
    border:2px solid #8a63d2; border-radius:18px; padding:22px 16px;
    text-align:center; min-height:120px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(0,0,0,.45);
  }
  .q-text { font-size:22px; font-weight:900; line-height:1.5; }
  .review-tag { font-size:12px; color:#ff8ad4; font-weight:800; margin-bottom:6px; letter-spacing:1px; }
  .q-text .big { font-size:34px; color:#ffe97d; letter-spacing:2px; }

  .choices { display:grid; gap:10px; margin-top:16px; }
  .choice-btn {
    background:#2e1b57; border:2px solid #6b4fa8; border-radius:14px;
    color:#fff; font-size:20px; font-weight:800; padding:14px; cursor:pointer;
    transition:transform .07s ease; font-family:inherit;
  }
  .choice-btn:active { transform:scale(.97); }
  .choice-btn.correct { background:#1d6b3a; border-color:#5aff9a; animation:pop .3s ease; }
  .choice-btn.wrong { background:#7a1f2e; border-color:#ff5a6e; animation:shake .3s ease; }
  .choice-btn:disabled { opacity:.92; }
  @keyframes pop { 50%{transform:scale(1.06)} }
  @keyframes shake { 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* オラオラ演出 */
  #fx {
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    pointer-events:none; z-index:50;
  }
  #fx.show { display:flex; }
  #fx .fx-text {
    font-size:44px; font-weight:900; letter-spacing:2px; text-align:center;
    transform:rotate(-7deg);
    animation:fxzoom .55s cubic-bezier(.2,1.6,.4,1);
    text-shadow:0 4px 0 rgba(0,0,0,.55);
  }
  #fx .ok { color:#ffe14a; -webkit-text-stroke:2px #b8410a; }
  #fx .ng { color:#b9a5ea; -webkit-text-stroke:1px #3a2260; font-size:34px; }
  @keyframes fxzoom { 0%{transform:scale(.2) rotate(-7deg); opacity:0} 60%{transform:scale(1.15) rotate(-7deg); opacity:1} 100%{transform:scale(1) rotate(-7deg)} }

  /* 結果画面 */
  .result-card { text-align:center; background:linear-gradient(160deg,#40286e,#241245); border:3px solid #ffd54a; border-radius:20px; padding:24px 16px; margin-top:8px; }
  .result-title { font-size:24px; font-weight:900; color:#ffe97d; letter-spacing:2px; }
  .result-score { font-size:44px; font-weight:900; margin:10px 0; }
  .result-exp { font-size:16px; color:#ff8ad4; font-weight:800; }
  .result-quote { margin-top:12px; font-size:14px; color:#cbbcf5; font-style:italic; }

  .btn-main {
    display:block; width:100%; margin-top:16px;
    background:linear-gradient(135deg,#ffd54a,#ff9a3d); color:#3a2200;
    border:none; border-radius:16px; padding:16px; font-size:19px; font-weight:900;
    cursor:pointer; box-shadow:0 5px 16px rgba(255,170,50,.35); font-family:inherit;
    letter-spacing:1px;
  }
  .btn-main:active { transform:scale(.98); }
  .btn-sub {
    display:block; width:100%; margin-top:10px; background:none;
    border:2px solid #8a63d2; color:#c9b8ff; border-radius:16px; padding:12px;
    font-size:15px; font-weight:800; cursor:pointer; font-family:inherit;
  }

  /* 進化オーバーレイ */
  #evo {
    position:fixed; inset:0; background:rgba(10,4,26,.94); z-index:100;
    display:none; align-items:center; justify-content:center; text-align:center;
  }
  #evo.show { display:flex; }
  .evo-inner { animation:fadein .5s ease; padding:20px; }
  .evo-dododo { font-size:22px; font-weight:900; color:#ffd54a; letter-spacing:6px; animation:gogofloat 1.2s ease-in-out infinite; }
  .evo-emoji { font-size:110px; margin:18px 0; display:inline-block; animation:evospin 1s cubic-bezier(.2,1.5,.4,1); filter:drop-shadow(0 0 30px rgba(255,213,74,.8)); }
  @keyframes evospin { 0%{transform:scale(0) rotate(-360deg)} 100%{transform:scale(1) rotate(0)} }
  .evo-name { font-size:26px; font-weight:900; color:#ffe97d; }
  .evo-sub { font-size:14px; color:#cbbcf5; margin-top:6px; }

  /* ===== ガチャ ===== */
  .btn-zukan {
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    margin-top:12px; background:linear-gradient(135deg,#1e3a5c,#12213d);
    border:2px solid #4a90d9; border-radius:16px; padding:14px;
    color:#bfe0ff; font-size:17px; font-weight:800; cursor:pointer; font-family:inherit;
  }
  .btn-zukan:active { transform:scale(.97); }

  .gacha-cta {
    display:block; width:100%; margin-top:14px;
    background:linear-gradient(135deg,#ff5abe,#a13cff); color:#fff;
    border:2px solid #ffd54a; border-radius:16px; padding:15px; font-size:18px; font-weight:900;
    cursor:pointer; font-family:inherit; letter-spacing:1px;
    box-shadow:0 5px 18px rgba(255,90,190,.4);
    animation:gachapulse 1.4s ease-in-out infinite;
  }
  @keyframes gachapulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  .gacha-rates { font-size:11px; color:#cbbcf5; text-align:center; margin-top:8px; }
  .gacha-locked { font-size:13px; color:#8a76c0; text-align:center; margin-top:14px; font-weight:700; }

  #gacha {
    position:fixed; inset:0; background:rgba(10,4,26,.96); z-index:120;
    display:none; align-items:center; justify-content:center; text-align:center;
  }
  #gacha.show { display:flex; }
  .gacha-card {
    width:230px; height:320px; border-radius:18px; margin:0 auto;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:16px; position:relative;
  }
  .gacha-back {
    background:linear-gradient(135deg,#3b2569,#1a0f33);
    border:3px solid #ffd54a; cursor:pointer;
    animation:cardshake .5s ease-in-out infinite;
    font-size:80px; color:#ffd54a; font-weight:900;
  }
  @keyframes cardshake { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
  .gacha-front { animation:cardreveal .6s cubic-bezier(.2,1.4,.4,1); }
  @keyframes cardreveal { 0%{transform:scale(.1) rotateY(180deg); opacity:0} 100%{transform:scale(1) rotateY(0); opacity:1} }

  /* ガチャ演出：落下→着地→オーラ→フラッシュ */
  .gacha-back.drop { animation:carddrop .85s cubic-bezier(.25,.7,.3,1) forwards; cursor:default; }
  @keyframes carddrop {
    0%   { transform:translateY(-95vh) rotate(560deg) scale(.5); opacity:0; }
    55%  { opacity:1; }
    82%  { transform:translateY(4vh) rotate(-6deg) scale(1.04); }
    100% { transform:translateY(0) rotate(0) scale(1); }
  }
  .gacha-back.charge { animation:cardshake .16s ease-in-out infinite; }
  .aura-white { box-shadow:0 0 26px rgba(255,255,255,.5); }
  .aura-B  { box-shadow:0 0 28px rgba(190,200,220,.75); }
  .aura-A  { box-shadow:0 0 42px rgba(181,123,255,.95), 0 0 80px rgba(181,123,255,.4); }
  .aura-S  { box-shadow:0 0 52px rgba(255,213,74,.95), 0 0 100px rgba(255,213,74,.5); }
  .gacha-back.aura-SS { animation:cardshake .12s ease-in-out infinite, ssaura .45s linear infinite; }
  @keyframes ssaura {
    0%   { box-shadow:0 0 70px #ffd54a, 0 0 140px #ff5abe, 0 0 220px rgba(255,90,190,.55); }
    25%  { box-shadow:0 0 70px #ff5abe, 0 0 140px #5ab8ff, 0 0 220px rgba(90,184,255,.55); }
    50%  { box-shadow:0 0 70px #5ab8ff, 0 0 140px #5aff9a, 0 0 220px rgba(90,255,154,.55); }
    75%  { box-shadow:0 0 70px #5aff9a, 0 0 140px #ffd54a, 0 0 220px rgba(255,213,74,.55); }
    100% { box-shadow:0 0 70px #ffd54a, 0 0 140px #ff5abe, 0 0 220px rgba(255,90,190,.55); }
  }
  #gacha.ss-bg { background:rgba(20,4,30,.97); }

  /* SS専用：回転する虹色の集中線＋キラキラ */
  .ss-rays {
    position:absolute; left:50%; top:50%; width:220vmax; height:220vmax;
    background:
      repeating-conic-gradient(rgba(255,255,255,0) 0deg 8deg, rgba(255,255,255,.09) 8deg 16deg),
      conic-gradient(#ff5abe, #ffd54a, #5aff9a, #5ab8ff, #b57bff, #ff5abe);
    opacity:.55; pointer-events:none;
    animation:ssspin 4s linear infinite;
  }
  @keyframes ssspin {
    from { transform:translate(-50%,-50%) rotate(0deg); }
    to   { transform:translate(-50%,-50%) rotate(360deg); }
  }
  .ss-spark {
    position:absolute; color:#ffe97d; pointer-events:none; z-index:3;
    text-shadow:0 0 14px #ffd54a, 0 0 30px #ff5abe;
    animation:sparkpop 1.1s ease-in-out infinite;
  }
  @keyframes sparkpop {
    0%,100% { transform:scale(.2) rotate(0deg); opacity:0; }
    50%     { transform:scale(1.5) rotate(180deg); opacity:1; }
  }
  #gacha .evo-inner { position:relative; z-index:2; }
  .evo-dododo.dodo-big { font-size:36px; color:#ff5abe; letter-spacing:10px; animation:gogofloat .5s ease-in-out infinite; }
  .white-flash {
    position:fixed; inset:0; background:#fff; z-index:140; pointer-events:none;
    animation:flashfade .5s ease-out forwards;
  }
  @keyframes flashfade { 0%{opacity:1} 100%{opacity:0} }

  .card-r-SS { background:linear-gradient(135deg,#3d1a5c,#1a0f33); border:4px solid transparent;
    background-clip:padding-box; box-shadow:0 0 34px rgba(255,213,74,.85), 0 0 70px rgba(255,90,190,.5);
    border-image:linear-gradient(135deg,#ffd54a,#ff5abe,#5ab8ff,#ffd54a) 1; }
  .card-r-S  { background:linear-gradient(135deg,#4a3a10,#241c05); border:3px solid #ffd54a; box-shadow:0 0 22px rgba(255,213,74,.55); }
  .card-r-A  { background:linear-gradient(135deg,#3a2a6e,#1c1440); border:3px solid #b57bff; box-shadow:0 0 14px rgba(181,123,255,.45); }
  .card-r-B  { background:linear-gradient(135deg,#3a3a44,#1e1e26); border:3px solid #9aa0b0; }

  .rar-badge { font-size:15px; font-weight:900; border-radius:8px; padding:2px 12px; display:inline-block; }
  .rar-SS { background:linear-gradient(90deg,#ffd54a,#ff5abe,#5ab8ff); color:#1a0f33; }
  .rar-S  { background:#ffd54a; color:#3a2703; }
  .rar-A  { background:#b57bff; color:#fff; }
  .rar-B  { background:#9aa0b0; color:#22262e; }

  .char-img {
    width:130px; height:130px; object-fit:contain; border-radius:10px;
    margin-top:10px; filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
  }
  .z-img { width:56px; height:56px; object-fit:contain; border-radius:6px; }
  .z-locked .z-img { filter:brightness(0); opacity:.9; }

  .gacha-name { font-size:20px; font-weight:900; color:#fff; margin:14px 0 6px; line-height:1.4; }
  .gacha-season { font-size:13px; color:#cbbcf5; }
  .gacha-new { font-size:17px; font-weight:900; color:#ffe14a; margin-top:10px; animation:gachapulse 1s ease-in-out infinite; }
  .gacha-dupe { font-size:13px; color:#8a76c0; margin-top:10px; }

  /* ===== 図鑑 ===== */
  .zukan-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .zukan-title { font-size:20px; font-weight:900; color:#ffe97d; }
  .zukan-total { font-size:12px; color:#cbbcf5; }
  .zukan-tabs { display:flex; gap:5px; margin:10px 0; flex-wrap:wrap; }
  .zukan-tab {
    flex:1; min-width:48px; background:#2e1b57; border:2px solid #6b4fa8; color:#c9b8ff;
    border-radius:10px; padding:7px 2px; font-size:13px; font-weight:800; cursor:pointer; font-family:inherit;
  }
  .zukan-tab.on { background:#ffd54a; color:#3a2703; border-color:#ffd54a; }
  .zukan-progress { font-size:12px; color:#cbbcf5; text-align:center; margin-bottom:8px; }
  .zukan-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .z-card {
    border-radius:12px; padding:10px 4px 8px; text-align:center; min-height:96px;
    display:flex; flex-direction:column; align-items:center; justify-content:space-between; gap:4px;
  }
  .z-card .z-name { font-size:11px; font-weight:800; line-height:1.3; word-break:break-word; }
  .z-card .rar-badge { font-size:10px; padding:1px 8px; }
  .z-card .z-count { font-size:9px; color:#cbbcf5; }
  .z-locked { background:#0d0817 !important; border:2px solid #2c2144 !important; box-shadow:none !important; }
  .z-locked .z-name { color:#4a3d6b; }
  .z-card { cursor:pointer; transition:transform .08s ease; }
  .z-card:active { transform:scale(.94); }

  /* 図鑑の拡大表示 */
  #zoom {
    position:fixed; inset:0; background:rgba(10,4,26,.96); z-index:130;
    display:none; align-items:center; justify-content:center; text-align:center;
    padding:20px;
  }
  #zoom.show { display:flex; }
  .zoom-card {
    width:min(320px, 88vw); border-radius:20px; padding:20px 16px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    animation:cardreveal .35s cubic-bezier(.2,1.3,.4,1);
  }
  .zoom-img { width:100%; max-height:min(340px, 44vh); object-fit:contain; border-radius:12px; filter:drop-shadow(0 6px 14px rgba(0,0,0,.55)); }
  .zoom-sil .zoom-img { filter:brightness(0); opacity:.9; }
  .zoom-name { font-size:22px; font-weight:900; color:#fff; line-height:1.4; }
  .zoom-sil .zoom-name { color:#4a3d6b; }
  .zoom-meta { font-size:14px; color:#cbbcf5; }
  .zoom-close { font-size:12px; color:#8a76c0; margin-top:14px; }

  footer { text-align:center; font-size:10px; color:#6f5aa0; margin-top:22px; padding-bottom:10px; }
  footer button { background:none; border:none; color:#6f5aa0; font-size:10px; text-decoration:underline; font-family:inherit; }
</style>
</head>
<body>
<div class="gogogo" style="top:6%; left:2%;">ゴ</div>
<div class="gogogo" style="top:22%; right:4%; animation-delay:1s;">ゴゴ</div>
<div class="gogogo" style="bottom:20%; left:5%; animation-delay:2s;">ゴゴゴ</div>
<div class="gogogo" style="bottom:6%; right:2%; animation-delay:.5s;">ゴ</div>

<div id="app">

  <!-- ホーム -->
  <div id="home" class="screen active">
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
    <h1>スタンド学習ドリル</h1>
    <div class="subtitle">— 黄金の精神で学べッ！ —</div>

    <div class="chara-card">
      <span class="menacing" style="top:8px; left:10px;">ゴ</span>
      <span class="menacing" style="top:20px; right:12px;">ゴゴ</span>
      <span class="menacing" style="bottom:10px; left:18px;">ゴゴ</span>
      <div class="chara-emoji" id="charaEmoji">🥚</div>
      <div class="chara-name" id="charaName">謎のタマゴ</div>
      <div class="chara-sub" id="charaSub">ゴゴゴ…何かが眠っている…</div>
      <div class="lv-row">
        <span class="lv-badge" id="lvBadge">Lv.1</span>
        <span class="streak" id="streakText">🔥 連続 0 日</span>
      </div>
      <div class="expbar"><div class="expfill" id="expFill"></div></div>
      <div class="exptext" id="expText"></div>
    </div>

    <div class="subject-grid">
      <button class="subj-btn" onclick="startQuiz('keisan')">
        <span class="icon">🧮</span>
        <span>計算ドリル<span class="desc">わり算・小数・分数・単位・時こく（3年後半〜4年）</span></span>
      </button>
      <button class="subj-btn" onclick="startQuiz('kanji')">
        <span class="icon">✍️</span>
        <span>漢字クイズ<span class="desc">3年生・4年生の漢字の読み方</span></span>
      </button>
      <button class="subj-btn" onclick="startQuiz('chiri')">
        <span class="icon">🗾</span>

/* ===== セーブデータ ===== */
const SAVE_KEY = "standDrillSave_v1";
let save = { exp:0, level:1, total:0, correct:0, streak:0, lastPlay:"", cards:{}, sound:true, missed:[] };

function loadSave(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) save = Object.assign(save, JSON.parse(raw));
  } catch(e){}
  // キャラリスト改訂で存在しなくなったキー（旧形式の番号キー含む）を掃除する
  const valid = new Set(CHARS.map(c => c[1] + "_" + c[0]));
  for (const k of Object.keys(save.cards)) {
    if (!valid.has(k)) delete save.cards[k];
  }
}
function writeSave(){ try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e){} }
function resetSave(){
  if (confirm("本当にデータをリセットする？キャラも Lv.1 にもどるよ！")) {
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
}

function expNeed(lv){ return 60 + (lv-1)*30; }
function stageFor(lv){
  let s = STAGES[0];
  for (const st of STAGES) if (lv >= st.lv) s = st;
  return s;
}

/* ===== 連続日数 ===== */
function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function updateStreak(){
  const today = todayStr();
  if (save.lastPlay === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
  save.streak = (save.lastPlay === yesterday) ? save.streak + 1 : 1;
  save.lastPlay = today;
}

/* ===== 効果音（Web Audio APIで合成。音声ファイル不要） ===== */
let audioCtx = null;
function ac(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, when, dur, type, vol, slideTo){
  if (!save.sound) return;
  try {
    const ctx = ac();
    const t = ctx.currentTime + when;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type || "sine";
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.2, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t + dur + 0.05);
  } catch(e){}
}
function noiseBurst(when, dur, vol, lowpass){
  if (!save.sound) return;
  try {
    const ctx = ac();
    const t = ctx.currentTime + when;
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = lowpass || 800;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f).connect(g).connect(ctx.destination);
    src.start(t);
  } catch(e){}
}

/* 正解：明るいピンポン♪ */
function toggleSound(){
  save.sound = !save.sound;
  writeSave();
  updateSoundBtn();
  if (save.sound) sfxCorrect();  // ONにした合図として1回鳴らす
}
function updateSoundBtn(){
  const b = document.getElementById("soundBtn");
  b.textContent = save.sound ? "🔊" : "🔇";
  b.classList.toggle("off", !save.sound);
}

function sfxCorrect(){
  tone(880, 0, .12, "square", .14);
  tone(1320, .1, .22, "square", .14);
}
/* 不正解：低いブブー */
function sfxWrong(){
  tone(220, 0, .25, "sawtooth", .11, 110);
  tone(165, .14, .3, "sawtooth", .09, 82);
}
/* ガチャ：ゴゴゴ…というドラムロール */
function sfxGachaRoll(){
  for (let i = 0; i < 6; i++) noiseBurst(i * .22, .18, .14, 300 + i * 80);
  tone(55, 0, 1.4, "sawtooth", .07, 70);
}
/* オーラ出現時のチャージ音（上位レアほど不穏に盛り上がる） */
function sfxCharge(r){
  tone(120, 0, .7, "sawtooth", .09, 480);
  if (r === "S" || r === "SS") tone(240, .3, .6, "square", .07, 960);
  if (r === "SS") {
    noiseBurst(.2, .9, .09, 500);
    tone(58, 0, 1.2, "sawtooth", .11, 92);
  }
}

/* レア度別の当たり音（上位ほど豪華に） */
function sfxReveal(r){
  if (r === "B") {            // ぽん
    tone(523, 0, .16, "triangle", .18);
  } else if (r === "A") {     // ぽんぽん↑
    tone(523, 0, .13, "triangle", .18);
    tone(784, .11, .25, "triangle", .18);
  } else if (r === "S") {     // 駆け上がるアルペジオ＋キラン
    [523, 659, 784, 1047].forEach((f, i) => tone(f, i * .09, .18, "triangle", .18));
    tone(2093, .42, .4, "sine", .11);
  } else {                    // SS：大ファンファーレ＋シャラーン
    [523, 659, 784].forEach((f, i) => tone(f, i * .12, .16, "square", .13));
    [1047, 1319, 1568].forEach((f, i) => tone(f, .42 + i * .12, .2, "square", .13));
    [523, 659, 784, 1047, 1568].forEach(f => tone(f, .88, .8, "triangle", .11));
    tone(2093, .92, .55, "sine", .09);
    tone(3136, 1.02, .55, "sine", .06);
    noiseBurst(.88, .5, .05, 7000);
  }
}

/* ===== 計算問題ジェネレーター（小4レベル） ===== */
function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function numWrongs(a, offsets){
  const s = new Set();
  let guard = 0;
  while (s.size < 3 && guard++ < 300) {
    const w = a + pick(offsets);
    if (w !== a && w > 0) s.add(w);
  }
  return [...s].map(String);
}

/* 角度・大きな数の豆問題（3年後半〜4年1学期） */
const MAME_BANK = [
  ["直角の角度は 何度？","90度",["45度","180度","100度"]],
  ["半回転の角度は 何度？","180度",["90度","270度","360度"]],
  ["1回転の角度は 何度？","360度",["180度","270度","300度"]],
  ["三角じょうぎの いちばん小さい角は 30度。あと2つは 90度と何度？","60度",["45度","30度","75度"]],
  ["1000を 10こ集めた数は？","1万",["1000","10万","100万"]],
  ["1億は 1万の 何倍？","1万倍",["100倍","1000倍","10万倍"]],
  ["100万を 10こ集めた数は？","1000万",["100万","1億","10万"]],
  ["一万を 38こ集めた数は？","38万",["3万8000","380万","38億"]],
];

/* 計算問題ジェネレーター（3年後半〜4年1学期） */
function genMath(){
  const type = rnd(1, 13);
  const offsets = [1,-1,10,-10,2,-2,20,-20,100,-100];
  let q, a;

  if (type === 1) {            // 3桁 + 3桁
    const x = rnd(120,899), y = rnd(120,899);
    q = `${x} + ${y}`; a = x + y;
  } else if (type === 2) {     // 3桁 - 3桁
    const x = rnd(300,999), y = rnd(100,299);
    q = `${x} − ${y}`; a = x - y;
  } else if (type === 3) {     // 2桁 × 1桁
    const x = rnd(12,99), y = rnd(3,9);
    q = `${x} × ${y}`; a = x * y;
  } else if (type === 4) {     // 2桁 × 2桁
    const x = rnd(12,49), y = rnd(11,29);
    q = `${x} × ${y}`; a = x * y;
  } else if (type === 5) {     // 3桁 × 1桁（3年後半の筆算）
    const x = rnd(123,987), y = rnd(2,9);
    q = `${x} × ${y}`; a = x * y;
  } else if (type === 6) {     // わり算（わり切れる）
    const y = rnd(3,9), ans = rnd(12,99);
    q = `${y*ans} ÷ ${y}`; a = ans;
  } else if (type === 7) {     // 計算のじゅんじょ
    const x = rnd(2,9), y = rnd(2,9), z = rnd(10,60);
    q = `${z} + ${x} × ${y}`; a = z + x * y;
  } else if (type === 8) {     // あまりのあるわり算（3年）
    const y = rnd(3,9), qt = rnd(3,12), r = rnd(1, y-1);
    const ans = `${qt} あまり ${r}`;
    const w = [
      `${qt+1} あまり ${r}`,
      `${qt} あまり ${r === 1 ? 2 : r-1}`,
      `${qt-1 >= 1 ? qt-1 : qt+2} あまり ${r}`,
    ];
    return { q:`<span class="big">${y*qt+r} ÷ ${y} = ?</span>`, a:ans, w };
  } else if (type === 9) {     // 小数のたし算・ひき算（3年後半）
    let xt = rnd(12,88), yt = rnd(11,87);
    const isAdd = Math.random() < .5;
    if (!isAdd && xt <= yt) [xt, yt] = [yt + rnd(1,9), yt];
    const at = isAdd ? xt + yt : xt - yt;
    const fmt = t => (t/10).toFixed(1);
    const wt = new Set();
    while (wt.size < 3) {
      const c = at + pick([1,-1,10,-10,2,-2]);
      if (c !== at && c > 0) wt.add(c);
    }
    return { q:`<span class="big">${fmt(xt)} ${isAdd?'+':'−'} ${fmt(yt)} = ?</span>`, a:fmt(at), w:[...wt].map(fmt) };
  } else if (type === 10) {    // 分数（同じ分母）（3年後半）
    const d = rnd(5,9);
    let n1, n2, n, sym;
    if (Math.random() < .5) { n1 = rnd(1,d-2); n2 = rnd(1,d-1-n1); n = n1+n2; sym = "+"; }
    else { n1 = rnd(2,d-1); n2 = rnd(1,n1-1); n = n1-n2; sym = "−"; }
    const w = [`${n+1}/${d}`, n-1 >= 1 ? `${n-1}/${d}` : `${n+2}/${d}`, `${n}/${d+1}`];
    return { q:`<span class="big">${n1}/${d} ${sym} ${n2}/${d} = ?</span>`, a:`${n}/${d}`, w };
  } else if (type === 11) {    // 単位の換算（3年）
    const U = [["km","m",1000],["m","cm",100],["cm","mm",10],["kg","g",1000],["L","dL",10],["dL","mL",100]];
    const [big, small, f] = pick(U);
    const v = rnd(2,9);
    const w = [`${v*f/10}${small}`, `${v*f*10}${small}`, `${(v+1)*f}${small}`];
    return { q:`${v}${big} は 何${small}？`, a:`${v*f}${small}`, w };
  } else if (type === 12) {    // 時こくと時間（3年）
    const h = rnd(1,10), m = pick([0,10,20,30,40,50]), add = pick([20,25,30,35,40,45,50]);
    const tot = m + add, nh = h + Math.floor(tot/60), nm = tot % 60;
    const ans = `${nh}時${nm}分`;
    const cand = [`${nh}時${nm === 50 ? nm-10 : nm+10}分`, `${nh+1}時${nm}分`, `${h}時${(m + add + 10) % 60}分`, `${nh+2}時${nm}分`];
    const w = [...new Set(cand.filter(c => c !== ans))].slice(0,3);
    return { q:`${h}時${m}分から ${add}分後の時こくは？`, a:ans, w };
  } else {                     // 角度・大きな数の豆問題
    const item = pick(MAME_BANK);
    return { q:item[0], a:item[1], w:[...item[2]] };
  }
  return { q:`<span class="big">${q} = ?</span>`, a:String(a), w:numWrongs(a, offsets) };
}

function fromBank(bank, kanjiMode){
  const item = pick(bank);
  if (kanjiMode) {
    return { q:`<span class="big">「${item[0]}」</span><br>の読み方はどれ？`, a:item[1], w:item[2] };
  }
  return { q:item[0], a:item[1], w:item[2] };
}

/* ===== クイズ進行 ===== */
let quizState = null;

/* 間違えた問題の記録（正解できたら消える） */
const MISS_MAX = 40;
function addMiss(item){
  if (!Array.isArray(save.missed)) save.missed = [];
  if (!save.missed.some(m => m.q === item.q)) {
    save.missed.push({ q:item.q, a:item.a, w:item.w, s:item.s });
    if (save.missed.length > MISS_MAX) save.missed.shift();
  }
  writeSave();
}
function removeMiss(item){
  if (!Array.isArray(save.missed)) return;
  const i = save.missed.findIndex(m => m.q === item.q);
  if (i >= 0) { save.missed.splice(i, 1); writeSave(); }
}

function buildSet(subject){
  const qs = [];
  const used = new Set();
  for (let i=0; i<QUESTIONS_PER_SET; i++) {
    let subj = subject;
    if (subject === "mix") subj = pick(["keisan","kanji","chiri","rika"]);
    let item, key, guard = 0;
    do {
      if (subj === "keisan") item = genMath();
      else if (subj === "kanji") item = fromBank(KANJI, true);
      else if (subj === "rika") item = fromBank(RIKA, false);
      else item = fromBank(CHIRI, false);
      key = item.q;
      guard++;
    } while (used.has(key) && guard < 30);
    used.add(key);
    item.s = subj;
    qs.push(item);
  }
  // 前に間違えた問題を「復習もんだい」としてまぜる（少しだけ出やすくする）
  // 1セットあたり 0〜2問・平均1問ほど
  const pool = (save.missed || []).filter(m => (subject === "mix" || m.s === subject) && !used.has(m.q));
  const shuffled = [...pool].sort(() => Math.random() - .5);
  const target = Math.min(shuffled.length, (Math.random() < .7 ? 1 : 0) + (Math.random() < .35 ? 1 : 0));
  const usedPos = new Set();
  for (let k = 0; k < target; k++) {
    const m = shuffled[k];
    let pos, guard = 0;
    do { pos = rnd(0, QUESTIONS_PER_SET - 1); guard++; } while (usedPos.has(pos) && guard < 20);
    if (usedPos.has(pos)) continue;
    usedPos.add(pos);
    qs[pos] = { q:m.q, a:m.a, w:[...m.w], s:m.s, review:true };
    used.add(m.q);
  }
  return qs;
}

function startQuiz(subject){
  quizState = {
    subject,
    questions: buildSet(subject),
    index: 0,
    correct: 0,
    combo: 0,
    maxCombo: 0,
    bonusExp: 0,
    answering: false,
  };
  showScreen("quiz");
  renderQuestion();
}

function renderQuestion(){
  const s = quizState;
  const item = s.questions[s.index];
  document.getElementById("qProgress").textContent = `第${s.index+1}問 / ${QUESTIONS_PER_SET}`;
  document.getElementById("comboText").textContent = s.combo >= 2 ? `🔥${s.combo}コンボ!` : "";
  document.getElementById("qText").innerHTML =
    (item.review ? '<div class="review-tag">🔁 復習もんだい</div>' : '') + item.q;

  const choices = [item.a, ...item.w].sort(() => Math.random() - .5);
  const box = document.getElementById("choices");
  box.innerHTML = "";
  for (const c of choices) {
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.textContent = c;
    b.onclick = () => answer(b, c === item.a, item.a);
    box.appendChild(b);
  }
  s.answering = true;
}

function answer(btn, isCorrect, correctAnswer){
  const s = quizState;
  if (!s.answering) return;
  s.answering = false;

  const buttons = document.querySelectorAll(".choice-btn");
  buttons.forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) b.classList.add("correct");
  });

  const item = s.questions[s.index];
  if (isCorrect) {
    s.correct++;
    s.combo++;
    s.maxCombo = Math.max(s.maxCombo, s.combo);
    if (s.combo >= 3) s.bonusExp += COMBO_BONUS;
    removeMiss(item);
    sfxCorrect();
    showFx(pick(OK_QUOTES), true);
  } else {
    btn.classList.add("wrong");
    s.combo = 0;
    addMiss(item);
    sfxWrong();
    showFx(pick(NG_QUOTES), false);
  }

  setTimeout(() => {
    s.index++;
    if (s.index < QUESTIONS_PER_SET) renderQuestion();
    else finishQuiz();
  }, 1100);
}

function showFx(text, ok){
  const fx = document.getElementById("fx");
  const t = document.getElementById("fxText");
  t.textContent = text;
  t.className = "fx-text " + (ok ? "ok" : "ng");
  fx.classList.add("show");
  setTimeout(() => fx.classList.remove("show"), 900);
}

/* ===== 結果とレベルアップ ===== */
function finishQuiz(){
  const s = quizState;
  let exp = s.correct * EXP_PER_CORRECT + s.bonusExp;
  if (s.correct === QUESTIONS_PER_SET) exp += PERFECT_BONUS;
  if (s.subject === "mix") exp += MIX_BONUS;

  const beforeStage = stageFor(save.level);

  save.total += QUESTIONS_PER_SET;
  save.correct += s.correct;
  save.exp += exp;
  updateStreak();
  let leveled = false;
  while (save.exp >= expNeed(save.level)) {
    save.exp -= expNeed(save.level);
    save.level++;
    leveled = true;
  }
  writeSave();

  document.getElementById("resScore").textContent = `${s.correct} / ${QUESTIONS_PER_SET}`;

    s.correct === QUESTIONS_PER_SET ? "パーフェクトッ！！" : "結果発表ッ！";

  if (leveled) expLine += `　⤴ Lv.${save.level} にアップ！`;
  document.getElementById("resExp").textContent = expLine;
  for (const [lo, hi, quote] of RESULT_QUOTES) {
    if (s.correct >= lo && s.correct <= hi) {
      document.getElementById("resQuote").textContent = quote;
      break;

  }
  renderGachaArea();
  showScreen("result");

  const afterStage = stageFor(save.level);
  if (afterStage !== beforeStage) {
    setTimeout(() => showEvo(afterStage), 600);
  }
}

   例: images/3_空条承太郎.png　※無ければ画像なしで動く */
function cardKey(idx){ return CHARS[idx][1] + "_" + CHARS[idx][0]; }

function imgTag(idx, cls){
  const name = CHARS[idx][0], part = CHARS[idx][1];
  const key = `${part}_${name}`;
  if (imgCache[key]) return `<img class="${cls}" src="${imgCache[key]}" alt="">`;
  const base = encodeURI(`images/${key}`);
  return `<img class="${cls}" src="${base}.png" data-alt="${base}.jpg|${base}.webp" onerror="imgFallback(this)" alt="">`;
}
function imgFallback(img){
  const alts = (img.getAttribute("data-alt") || "").split("|").filter(Boolean);
  if (alts.length) {
    img.src = alts.shift();
    img.setAttribute("data-alt", alts.join("|"));
  } else {
    img.style.display = "none";
  }
}

/* ===== 画像パック（zip）読み込み =====
   ネット公開版には画像を含めないため、各スマホで画像パック.zipを
   読み込んで端末内（IndexedDB）に保存する仕組み。追加ライブラリ不要 */
let imgCache = {};  // "3_空条承太郎" → blob URL

function idbOpen(){
  return new Promise((res, rej) => {
    const r = indexedDB.open("standDrillImgs", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("imgs");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbPutAll(entries){
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("imgs", "readwrite");
    const st = tx.objectStore("imgs");
    st.clear();
    for (const [k, blob] of entries) st.put(blob, k);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function idbLoadAll(){
  try {
    const db = await idbOpen();
    return await new Promise((res, rej) => {
      const tx = db.transaction("imgs", "readonly");
      const st = tx.objectStore("imgs");
      const keysReq = st.getAllKeys();
      const valsReq = st.getAll();
      tx.oncomplete = () => {
        const out = {};
        keysReq.result.forEach((k, i) => { out[k] = valsReq.result[i]; });
        res(out);
      };
      tx.onerror = () => rej(tx.error);
    });
  } catch(e){ return {}; }
}
async function initImgCache(){
  const all = await idbLoadAll();
  for (const k in all) imgCache[k] = URL.createObjectURL(all[k]);
  updatePackStatus();
}
function updatePackStatus(){
  const el = document.getElementById("packStatus");
  const n = Object.keys(imgCache).length;
  if (el && n > 0) el.textContent = `📦 画像パック読み込みずみ（${n}枚）`;
}

/* zip解凍（ブラウザ標準のDecompressionStreamを使用） */
async function parseZip(buf){
  const dv = new DataView(buf);
  const u8 = new Uint8Array(buf);
  let eocd = -1;
  for (let i = buf.byteLength - 22; i >= 0; i--) {
    if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd < 0) throw new Error("zip形式ではありません");
  const count = dv.getUint16(eocd + 10, true);
  let off = dv.getUint32(eocd + 16, true);
  const files = [];
  const td = new TextDecoder("utf-8");
  for (let n = 0; n < count; n++) {
    if (dv.getUint32(off, true) !== 0x02014b50) break;
    const method = dv.getUint16(off + 10, true);
    const csize = dv.getUint32(off + 20, true);
    const nameLen = dv.getUint16(off + 28, true);
    const extraLen = dv.getUint16(off + 30, true);
    const cmtLen = dv.getUint16(off + 32, true);
    const lho = dv.getUint32(off + 42, true);
    const name = td.decode(u8.subarray(off + 46, off + 46 + nameLen));
    const lNameLen = dv.getUint16(lho + 26, true);
    const lExtraLen = dv.getUint16(lho + 28, true);
    const dataStart = lho + 30 + lNameLen + lExtraLen;
    files.push({ name, method, data: u8.subarray(dataStart, dataStart + csize) });
    off += 46 + nameLen + extraLen + cmtLen;
  }
  const out = [];
  for (const f of files) {
    if (f.name.endsWith("/")) continue;
    let bytes;
    if (f.method === 0) bytes = f.data;
    else if (f.method === 8) {
      const ds = new DecompressionStream("deflate-raw");
      const stream = new Blob([f.data]).stream().pipeThrough(ds);
      bytes = new Uint8Array(await new Response(stream).arrayBuffer());
    } else continue;
    out.push({ name: f.name, bytes });
  }
  return out;
}

async function importImagePack(input){
  const file = input.files && input.files[0];
  if (!file) return;
  const status = document.getElementById("packStatus");
  status.textContent = "読み込み中…（少し時間がかかります）";
  try {
    const entries = await parseZip(await file.arrayBuffer());
    const put = [];
    for (const e of entries) {
      const m = e.name.match(/([^\/\\]+)\.(png|jpg|jpeg|webp)$/i);
      if (!m) continue;
      const mime = { png:"image/png", jpg:"image/jpeg", jpeg:"image/jpeg", webp:"image/webp" }[m[2].toLowerCase()];
      put.push([m[1], new Blob([e.bytes], { type: mime })]);
    }
    if (!put.length) throw new Error("zipの中に画像がありません");
    await idbPutAll(put);
    for (const url of Object.values(imgCache)) URL.revokeObjectURL(url);
    imgCache = {};
    for (const [k, blob] of put) imgCache[k] = URL.createObjectURL(blob);
    status.textContent = `✅ 画像 ${put.length} 枚を読み込みました！図鑑を見てみよう`;
    sfxCorrect();
  } catch(err) {
    status.textContent = "❌ 読み込めませんでした（" + err.message + "）";
  }
  input.value = "";
}

function rollRarity(correct){
  const r = GACHA_RATES[correct];
  let x = Math.random() * 100;
  for (const k of ["SS","S","A"]) {
    if (x < r[k]) return k;
    x -= r[k];
  }
  return "B";
}

function rollChar(rarity){
  const pool = [];
  CHARS.forEach((c, i) => {
    if (c[3] !== rarity) return;
    let w = c[2];
    if (save.cards[c[1] + "_" + c[0]]) w *= 0.5;  // 所持ずみキャラは重みを半分に（新キャラ優先）
    pool.push([i, w]);
  });
  const total = pool.reduce((sum, p) => sum + p[1], 0);
  let x = Math.random() * total;
  for (const [i, w] of pool) {
    if (x < w) return i;
    x -= w;
  }
  return pool[pool.length - 1][0];
}

function renderGachaArea(){
  const s = quizState;
  const area = document.getElementById("gachaArea");
  if (s.correct < GACHA_MIN_CORRECT) {
    area.innerHTML = '<div class="gacha-locked">🔒 5問以上正解でカードガチャが引けるぞ…！</div>';
    return;
  }
  if (s.gachaDone) { area.innerHTML = ""; return; }
  const r = GACHA_RATES[s.correct];
  area.innerHTML =
    '<button class="gacha-cta" onclick="doGacha()">🃏 カードガチャを引くッ！</button>' +
    `<div class="gacha-rates">排出率：SS ${r.SS}%　S ${r.S}%　A ${r.A}%　B ${r.B}%</div>`;
}

function doGacha(){
  const s = quizState;
  if (s.gachaDone || s.correct < GACHA_MIN_CORRECT) return;
  s.gachaDone = true;
  s.pendingCard = rollChar(rollRarity(s.correct));
  renderGachaArea();
  const rarity = CHARS[s.pendingCard][3];
  document.getElementById("gachaInner").innerHTML =
    '<div class="evo-dododo" id="gachaDodo">ゴ ゴ ゴ ゴ …</div>' +
    '<div class="gacha-card gacha-back drop" id="gachaCard">？</div>' +
    '<div id="gachaHint" style="margin-top:16px; font-size:13px; color:#cbbcf5; visibility:hidden;">カードをタップしてめくれッ！</div>';
  document.getElementById("gacha").classList.add("show");
  sfxGachaRoll();

  const card = document.getElementById("gachaCard");
  setTimeout(() => {                       // 着地の衝撃
    card.classList.remove("drop");
    noiseBurst(0, .25, .28, 250);
  }, 860);
  setTimeout(() => {                       // まず白いオーラ…
    card.classList.add("aura-white");
  }, 1150);
  setTimeout(() => {                       // レア度の色に変化ッ！
    card.classList.remove("aura-white");
    card.classList.add("charge", "aura-" + rarity);
    sfxCharge(rarity);
    if (rarity === "S" || rarity === "SS") {
      document.getElementById("gachaDodo").classList.add("dodo-big");
    }
    if (rarity === "SS") {
      const g = document.getElementById("gacha");
      g.classList.add("ss-bg");
      const rays = document.createElement("div");
      rays.className = "ss-rays";
      g.insertBefore(rays, g.firstChild);
      for (let i = 0; i < 10; i++) {
        const sp = document.createElement("div");
        sp.className = "ss-spark";
        sp.textContent = pick(["✦", "✧", "★"]);
        sp.style.left = (8 + Math.random() * 84) + "%";
        sp.style.top = (8 + Math.random() * 78) + "%";
        sp.style.fontSize = (16 + Math.random() * 22) + "px";
        sp.style.animationDelay = (Math.random() * 1.1) + "s";
        g.appendChild(sp);
      }
    }
  }, 1950);
  setTimeout(() => {                       // タップ解禁
    document.getElementById("gachaHint").style.visibility = "visible";
    card.onclick = revealGacha;
    card.style.cursor = "pointer";
  }, 2700);
}

function revealGacha(){
  const idx = quizState.pendingCard;
  if (idx == null) return;
  quizState.pendingCard = null;
  // 開封フラッシュ（SS演出の後片付けもここで）
  const g = document.getElementById("gacha");
  g.classList.remove("ss-bg");
  g.querySelectorAll(".ss-rays, .ss-spark").forEach(el => el.remove());
